server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: modulo-admin          
          uri: lb://servicio-administrador  
          predicates:
            - Path=/api/administradores/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/