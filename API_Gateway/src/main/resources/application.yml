server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: modulo-admin          
          uri: lb://servicio-administrador  
          predicates:
            - Path=/api/administradores/**

        - id: modulo-proveedores
          uri: lb://servicio-proveedores
          predicates:
            - Path=/api/proveedores/**

        - id: modulo-clientes
          uri: lb://servicio-clientes
          predicates:
            - Path=/api/clientes/**

        - id: modulo-productos
          uri: lb://productos
          predicates:
            - Path=/api/productos/**

        - id: modulo-administrador
          uri: lb://administrador
          predicates:
            - Path=/api/administrador/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/