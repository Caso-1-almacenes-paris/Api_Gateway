server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: modulo-admin          
          uri: lb://servicio-administrador  
          predicates:
            - Path=/api/v1/administradores/** 

        - id: modulo-proveedores
          uri: lb://servicio-proveedores
          predicates:
            - Path=/api/v1/proveedores/**
            
        - id: modulo-clientes
          uri: lb://clientes 
          predicates:
            - Path=/api/v1/clientes/** 

        - id: modulo-productos
          uri: lb://productos
          predicates:
            - Path=/api/v1/productos/**

        - id: modulo-ventas
          uri: lb://ventas
          predicates:
            - Path=/api/v1/ventas/**

        - id: modulo-comprobantes
          uri: lb://registro 
          predicates:
            - Path=/api/v1/comprobantes/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/